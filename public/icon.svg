<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#3d2b1f"/>
  <defs>
    <clipPath id="cup-body">
      <rect x="116" y="182" width="280" height="226" rx="30"/>
    </clipPath>
  </defs>
  <!--
    Self-balancing composition: do NOT add centering transforms.
    Compact handle (small right overhang) + steam drifting left
    counterweight each other; the translate is baked in and final
    (-10 x optical balance, -28 y so the mug body centre sits near
    the canvas centre instead of the steam pushing it low).
    Bands: matcha / milk / espresso — the app logs both drinks.
  -->
  <g transform="translate(-10 -28)">
    <!-- compact D-handle tucked against the body -->
    <path d="M394 246 a45 45 0 0 1 0 90" stroke="#c97b3a" stroke-width="30" fill="none" stroke-linecap="round"/>
    <!-- layered cup body: matcha, milk, espresso -->
    <g clip-path="url(#cup-body)">
      <rect x="116" y="182" width="280" height="75" fill="#8b9d5d"/>
      <rect x="116" y="257" width="280" height="75" fill="#e8c79a"/>
      <rect x="116" y="332" width="280" height="76" fill="#6f4423"/>
      <line x1="116" y1="257" x2="396" y2="257" stroke="#3d2b1f" stroke-width="3" stroke-opacity="0.22"/>
      <line x1="116" y1="332" x2="396" y2="332" stroke="#3d2b1f" stroke-width="3" stroke-opacity="0.22"/>
    </g>
    <!-- saucer -->
    <rect x="87" y="422" width="338" height="26" rx="13" fill="#c97b3a"/>
    <!-- short steam wisps, drifting left to counterweight the handle -->
    <path d="M200 164 q-13 -24 0 -46" stroke="#faf7f2" stroke-width="16" fill="none" stroke-linecap="round"/>
    <path d="M250 153 q-13 -24 0 -46" stroke="#faf7f2" stroke-width="16" fill="none" stroke-linecap="round"/>
    <path d="M300 164 q-13 -24 0 -46" stroke="#faf7f2" stroke-width="16" fill="none" stroke-linecap="round"/>
  </g>
</svg>
